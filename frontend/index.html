<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Task Assistant</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header>

        <h1>🤖 AI Task Assistant</h1>

        <p>
            Create tasks using natural language.
        </p>

    </header>

    <!-- ========================= -->
    <!-- Input Section -->
    <!-- ========================= -->

    <section class="input-section">

        <textarea
            id="query"
            placeholder="Examples:

• Create task to fix login bug tomorrow high priority

• Prepare interview next Friday

• Submit project by 25 July

• Buy groceries today"
        ></textarea>

        <div class="button-row">

            <button id="createBtn">

                ➕ Create Task

            </button>

        </div>

        <small class="hint">

            💡 Tip:
            Press <strong>Ctrl + Enter</strong> to create a task.

        </small>

    </section>

    <hr>

    <!-- ========================= -->
    <!-- Task List -->
    <!-- ========================= -->

    <section>

        <div class="task-header">

            <h2>📋 Tasks</h2>

            <span id="taskCount">
                0 Tasks
            </span>

        </div>

        <div id="taskList">

            <div class="empty">

                📭

                <h3>No Tasks Yet</h3>

                <p>
                    Create your first AI task.
                </p>

            </div>

        </div>

    </section>

</div>

<!-- ========================= -->
<!-- Loading Overlay -->
<!-- ========================= -->

<div id="loadingOverlay"
     class="hidden">

    <div class="loader"></div>

    <p>Creating Task...</p>

</div>

<!-- ========================= -->
<!-- Toast -->
<!-- ========================= -->

<div id="toast"></div>

<!-- ========================= -->
<!-- Footer -->
<!-- ========================= -->

<footer>

    AI Task Assistant • Powered by FastAPI + Groq + SQLite

</footer>

<!-- ========================= -->
<!-- JavaScript -->
<!-- ========================= -->

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
